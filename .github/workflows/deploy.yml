# Desplegament al servidor (SSH + git pull + Docker)
#
# Sense DEPLOY_* complet, el pas SSH s'omet (workflow verd, sense error).
# Configuració: Settings → Secrets and variables → Actions
#   - Secret: DEPLOY_SSH_KEY (clau privada PEM completa)
#   - Secret o Variable: DEPLOY_HOST, DEPLOY_USER
#   Opcional: DEPLOY_PATH (secret o variable; per defecte ~/prj-entrades-nou)
#
# Nota: no es pot usar `secrets` dins `if:` del job; la comprovació és un pas amb output.
#
name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branca a desplegar'
        required: true
        default: 'main'
        type: string
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Comprovar si hi ha configuració de desplegament
        id: deploy_gate
        env:
          HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$KEY" ]; then
            echo "run_deploy=false" >> "$GITHUB_OUTPUT"
            echo '::notice title=Deploy desactivat::Defineix DEPLOY_HOST, DEPLOY_USER (secret o variable) i DEPLOY_SSH_KEY (secret).'
          else
            echo "run_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Desplegar per SSH
        if: steps.deploy_gate.outputs.run_deploy == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            BRANCH='${{ github.event.inputs.branch }}'
            if [ -z "$BRANCH" ]; then
              BRANCH='${{ github.ref_name }}'
            fi
            DEPLOY_PATH='${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="${HOME}/prj-entrades-nou"
            fi
            echo "Branca: $BRANCH — directori: $DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            docker compose -f docker/dev/docker-compose.yml build
            docker compose -f docker/dev/docker-compose.yml up -d
            docker compose -f docker/dev/docker-compose.yml ps
