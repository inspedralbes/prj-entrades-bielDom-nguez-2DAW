# Desplegament al servidor (SSH + git pull + Docker)
# Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, opcional DEPLOY_PATH
#
name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branca a desplegar'
        required: true
        default: 'main'
        type: string
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      # Sense DEPLOY_HOST l'action SSH falla amb "missing server host"
      - name: Comprovar secrets obligatoris (DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY)
        env:
          H: ${{ secrets.DEPLOY_HOST }}
          U: ${{ secrets.DEPLOY_USER }}
          K: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$H" ]; then
            echo "::error title=Secret faltant::Afegeix el repository secret DEPLOY_HOST (IP o domini del servidor): Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$U" ]; then
            echo "::error title=Secret faltant::Afegeix el repository secret DEPLOY_USER (usuari SSH)."
            exit 1
          fi
          if [ -z "$K" ]; then
            echo "::error title=Secret faltant::Afegeix el repository secret DEPLOY_SSH_KEY (clau privada PEM, sencer)."
            exit 1
          fi

      - name: Desplegar per SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            BRANCH='${{ github.event.inputs.branch }}'
            if [ -z "$BRANCH" ]; then
              BRANCH='${{ github.ref_name }}'
            fi
            DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="${HOME}/prj-entrades-nou"
            fi
            echo "Branca: $BRANCH — directori: $DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            docker compose -f docker/dev/docker-compose.yml build
            docker compose -f docker/dev/docker-compose.yml up -d
            docker compose -f docker/dev/docker-compose.yml ps
