# Desplegament al servidor (SSH + git pull + Docker)
#
# Si no tens secrets/variables de desplegament, el job "SSH deploy" es SALTA (verd, sense error).
# Per activar el desplegament automàtic (push a main o workflow manual):
#   Settings → Secrets and variables → Actions
#   - Secret: DEPLOY_SSH_KEY (clau privada PEM completa)
#   - Secret o Variable: DEPLOY_HOST (IP o domini)
#   - Secret o Variable: DEPLOY_USER (usuari SSH)
#   Opcional: DEPLOY_PATH (secret o variable; per defecte ~/prj-entrades-nou)
#
name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branca a desplegar'
        required: true
        default: 'main'
        type: string
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    # Només s'executa si hi ha clau SSH i host i usuari (com a secret o variable)
    if: ${{ secrets.DEPLOY_SSH_KEY != '' && (secrets.DEPLOY_HOST != '' || vars.DEPLOY_HOST != '') && (secrets.DEPLOY_USER != '' || vars.DEPLOY_USER != '') }}

    steps:
      - name: Desplegar per SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            BRANCH='${{ github.event.inputs.branch }}'
            if [ -z "$BRANCH" ]; then
              BRANCH='${{ github.ref_name }}'
            fi
            DEPLOY_PATH='${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="${HOME}/prj-entrades-nou"
            fi
            echo "Branca: $BRANCH — directori: $DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            docker compose -f docker/dev/docker-compose.yml build
            docker compose -f docker/dev/docker-compose.yml up -d
            docker compose -f docker/dev/docker-compose.yml ps
