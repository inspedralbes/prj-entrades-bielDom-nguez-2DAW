# Desplegament al servidor (SSH + git pull + Docker)
#
# Configuració (Settings → Secrets and variables → Actions):
# - Obligatori: secret DEPLOY_SSH_KEY (clau privada PEM completa)
# - Host i usuari: secret DEPLOY_HOST / DEPLOY_USER **o** variable DEPLOY_HOST / DEPLOY_USER
#   (les variables no amaguen el valor; la clau sempre ha de ser secret)
# - Opcional: secret o variable DEPLOY_PATH (ruta al servidor; per defecte ~/prj-entrades-nou)
#
name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branca a desplegar'
        required: true
        default: 'main'
        type: string
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      # Host i usuari: secrets o variables de repositori (vege capçalera del fitxer)
      - name: Comprovar configuració de desplegament
        env:
          HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$HOST" ]; then
            echo "::error::Define DEPLOY_HOST com a Secret o Variable del repositori (IP o domini)."
            exit 1
          fi
          if [ -z "$USER" ]; then
            echo "::error::Define DEPLOY_USER com a Secret o Variable del repositori."
            exit 1
          fi
          if [ -z "$KEY" ]; then
            echo "::error::Afegeix el secret DEPLOY_SSH_KEY (clau privada PEM, sencer)."
            exit 1
          fi

      - name: Desplegar per SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            BRANCH='${{ github.event.inputs.branch }}'
            if [ -z "$BRANCH" ]; then
              BRANCH='${{ github.ref_name }}'
            fi
            DEPLOY_PATH='${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="${HOME}/prj-entrades-nou"
            fi
            echo "Branca: $BRANCH — directori: $DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            docker compose -f docker/dev/docker-compose.yml build
            docker compose -f docker/dev/docker-compose.yml up -d
            docker compose -f docker/dev/docker-compose.yml ps
