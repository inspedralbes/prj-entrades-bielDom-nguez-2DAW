# Entorn de desenvolupament — Postgres 16 + PostGIS, Redis 7.2, API Laravel, Nuxt, Socket.IO, Adminer (opcional)
# Context de build: arrel del monorepo (../../)
# Esquema SQL: ../../database/init.sql + ../../database/inserts.sql (només en crear el volum buit de dades).
#
# Adminer va al perfil "tools" per defecte: `docker compose up` no el descarrega (evita fallides de pull CDN).
# Per arrencar Adminer: docker compose --profile tools -f docker/dev/docker-compose.yml up
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: esdeveniments
      POSTGRES_USER: esdeveniments
      POSTGRES_PASSWORD: esdeveniments
    ports:
      - '5432:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ../../database/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../database/inserts.sql:/docker-entrypoint-initdb.d/02-inserts.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U esdeveniments -d esdeveniments']
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    profiles: [tools]
    image: adminer:4.8.1
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  # Espeig oficial a AWS Public ECR (mateixa imatge library/redis que Docker Hub, altres capes/CDN).
  # Si el pull des de docker.io falla (timeout a cloudflarestorage.com / R2), aquest mirror sol respondre millor.
  redis:
    image: public.ecr.aws/docker/library/redis:7.2
    ports:
      - '6379:6379'

  backend-api:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/backend-api/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ../../backend-api:/var/www/html
      - ../../database:/var/www/database:ro
      - ./entrypoint-api.sh:/entrypoint-api.sh:ro
    ports:
      - '8000:8000'
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: esdeveniments
      DB_USERNAME: esdeveniments
      DB_PASSWORD: esdeveniments
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Buit: les claus de holds del mapa (event:{id}:seat:…) han de coincidir amb KEYS/GET; el prefix per defecte de Laravel trenca getHoldsForEvent.
      REDIS_PREFIX: ""
      # JWT_SECRET: NO es defineix aquí — Laravel el llegeix de `backend-api/.env` (volum muntat).
      # Ha de ser idèntic a `JWT_SECRET` de `socket-server/.env` (firebase/php-jwt HS256: mín. ~32 caràcters).
      # Ha de coincidir amb JWT_SECRET del servei socket-server (només namespace /private: alliberar holds al tancar).
      # SeatStatusUpdated (mapa públic) ve de POST /internal/emit; no depèn del JWT del navegador.
      # Només Laravel (HTTP server→server dins Docker). NO és la URL del navegador: dins del contenidor
      # backend-api, localhost:3001 apunta al propi contenidor i /internal/emit falla. Cal el nom del servei compose.
      SOCKET_SERVER_INTERNAL_URL: http://socket-server:3001
      # Buit explícit: evita 403 a /internal/emit si el .env del host té un secret diferent al del socket-server.
      SOCKET_INTERNAL_SECRET: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      socket-server:
        condition: service_started
    entrypoint: [/bin/sh, /entrypoint-api.sh]

  frontend-nuxt:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/frontend-nuxt/Dockerfile
    working_dir: /app
    volumes:
      - ../../frontend-nuxt:/app
      - nuxt_node_modules:/app/node_modules
    ports:
      - '3000:3000'
    environment:
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      # Navegador → localhost:8000; Node SSR dins el contenidor ha d’usar el servei compose.
      NUXT_API_INTERNAL_URL: http://backend-api:8000
      NUXT_PUBLIC_API_URL: http://localhost:8000
      # Navegador del teu PC → port publicat; correcte (no usar socket-server aquí).
      NUXT_PUBLIC_SOCKET_URL: http://localhost:3001
    depends_on:
      - backend-api
    # prepare: genera .nuxt abans del dev (el volum bind sovint no té .nuxt al primer cop).
    command: sh -c "npx nuxt prepare && npm run dev -- --host 0.0.0.0 --port 3000"

  socket-server:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/socket-server/Dockerfile
    working_dir: /app
    volumes:
      - ../../socket-server:/app
      - socket_node_modules:/app/node_modules
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      # JWT_SECRET: del fitxer `socket-server/.env` (volum muntat); mateix valor que `JWT_SECRET` a `backend-api/.env`.
      LARAVEL_INTERNAL_API_URL: http://backend-api:8000
      SOCKET_INTERNAL_SECRET: ""
    depends_on:
      - redis
    command: npm run dev

volumes:
  pgdata_dev: {}
  nuxt_node_modules: {}
  socket_node_modules: {}
