# Entorn de desenvolupament — Postgres 16 + PostGIS, Redis 7.2, API Laravel, Nuxt, Socket.IO, Adminer
# Context de build: arrel del monorepo (../../)
# Esquema SQL: ../../database/init.sql + ../../database/inserts.sql (només en crear el volum buit de dades).
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: esdeveniments
      POSTGRES_USER: esdeveniments
      POSTGRES_PASSWORD: esdeveniments
    ports:
      - '5432:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ../../database/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../database/inserts.sql:/docker-entrypoint-initdb.d/02-inserts.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U esdeveniments -d esdeveniments']
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7.2-alpine
    ports:
      - '6379:6379'

  backend-api:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/backend-api/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ../../backend-api:/var/www/html
    ports:
      - '8000:8000'
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: esdeveniments
      DB_USERNAME: esdeveniments
      DB_PASSWORD: esdeveniments
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SOCKET_SERVER_INTERNAL_URL: http://socket-server:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      socket-server:
        condition: service_started
    # config:clear evita servir DB_HOST cachejat (127.0.0.1) si s’ha fet config:cache fora del contenidor.
    command: sh -c "php artisan config:clear && php artisan serve --host=0.0.0.0 --port=8000"

  frontend-nuxt:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/frontend-nuxt/Dockerfile
    working_dir: /app
    volumes:
      - ../../frontend-nuxt:/app
      - nuxt_node_modules:/app/node_modules
    ports:
      - '3000:3000'
    environment:
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      NUXT_PUBLIC_API_URL: http://localhost:8000
      NUXT_PUBLIC_SOCKET_URL: http://localhost:3001
    depends_on:
      - backend-api
    # prepare: genera .nuxt abans del dev (el volum bind sovint no té .nuxt al primer cop).
    command: sh -c "npx nuxt prepare && npm run dev -- --host 0.0.0.0 --port 3000"

  socket-server:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/socket-server/Dockerfile
    working_dir: /app
    volumes:
      - ../../socket-server:/app
      - socket_node_modules:/app/node_modules
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_me
    depends_on:
      - redis
    command: npm run dev

volumes:
  pgdata_dev: {}
  nuxt_node_modules: {}
  socket_node_modules: {}
