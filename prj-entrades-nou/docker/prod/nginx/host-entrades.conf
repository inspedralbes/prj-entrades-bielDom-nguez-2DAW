# Reverse proxy Nginx — mateix host :80 cap als contenidors Docker (127.0.0.1)
# API Laravel: :8000  |  Nuxt: :3000  |  Socket.IO: :3001
#
# Instal·lació (Ubuntu/Debian):
#   sudo cp docker/prod/nginx/host-entrades.conf /etc/nginx/sites-available/entrades
#   sudo ln -sf /etc/nginx/sites-available/entrades /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Abans: els serveis Docker han d’escoltar només a localhost (vegeu docker/prod/README.md).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream entrades_nuxt {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream entrades_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream entrades_socket {
    server 127.0.0.1:3001;
    keepalive 32;
}

# default_server: evita que /etc/nginx/sites-enabled/default (pàgina «Welcome to nginx»)
# robi les peticions a la IP. Després d’instal·lar, elimina o desactiva el lloc per defecte:
#   sudo rm -f /etc/nginx/sites-enabled/default
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    # IP, domini o qualsevol Host (útil si entres per IP o nom DNS)
    server_name _ 89.167.124.133;

    client_max_body_size 32M;

    # API Laravel (prefix /api des de routes/api.php)
    location /api/ {
        proxy_pass http://entrades_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # Health Laravel sense prefix API (Laravel 11)
    location = /up {
        proxy_pass http://entrades_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO (client Nuxt amb NUXT_PUBLIC_SOCKET_URL=http://89.167.124.133)
    location /socket.io/ {
        proxy_pass http://entrades_socket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # Nuxt (tota la resta: SSR, assets /_nuxt, etc.)
    location / {
        proxy_pass http://entrades_nuxt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
