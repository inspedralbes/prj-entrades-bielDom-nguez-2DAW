# CI — comprovacions ràpides sense aixecar tot el stack Docker (el smoke complet és smoke.yml)
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Laravel (PHPUnit + Pint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, fileinfo, json, tokenizer, pdo, pdo_sqlite, bcmath
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend-api/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Pint (estil)
        run: ./vendor/bin/pint --test

      - name: PHPUnit
        run: php artisan test

  frontend-nuxt:
    name: Nuxt (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-nuxt

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-nuxt/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Build Nuxt
        env:
          NUXT_TELEMETRY_DISABLED: '1'
          NUXT_PUBLIC_API_URL: http://localhost:8000
          NUXT_PUBLIC_SOCKET_URL: http://localhost:3001
        run: npm run build

  socket-server:
    name: Socket server (deps + sintaxi)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: socket-server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: socket-server/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Comprovació sintaxi entrypoint
        run: node --check src/index.js
