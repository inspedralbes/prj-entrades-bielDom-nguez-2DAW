openapi: 3.1.0
info:
  title: Entrades API (MVP seat-map / hold / tickets / validation)
  version: 0.4.0
  description: |
    Esborrany alineat amb spec.md i implementació backend (fase 6): auth JWT (`token` al cos),
    holds anònims, comandes `pending_payment`, errors de seient, social (friend_invites, transfer),
    admin stub, validació. Socket híbrid documentat al spec (no WebSocket dins OpenAPI).

servers:
  - url: https://api.example.com
    description: Producció
  - url: http://localhost:8000
    description: Local backend-api

tags:
  - name: Auth
  - name: Holds
  - name: Social
  - name: Admin

paths:
  /api/auth/register:
    post:
      summary: Registre d’usuari (JWT resposta)
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuari creat; token JWT (cos o cookie segons implementació)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          description: Validació fallida (email duplicat, etc.)

  /api/auth/login:
    post:
      summary: Inici de sessió (JWT)
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Credencials invàlides

  /api/auth/me:
    get:
      summary: Perfil mínim de l’usuari autenticat
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dades bàsiques de perfil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  /api/events/{eventId}/seatmap:
    get:
      summary: Mapa de seients (proxy Top Picks / dades fusionades)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Imatge snapshot URL + zones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeatmapResponse'

  /api/events/{eventId}/holds:
    post:
      summary: Crear hold atòmic (fins a 6 seients); pot ser anònim (sense Bearer)
      description: |
        Sense autenticació, el client envia (o rep via cookie) un identificador de sessió anònim per vincular el hold.
        Amb Bearer, opcionalment s’associa el hold a l’usuari autenticat.
      tags: [Holds]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seat_ids]
              properties:
                seat_ids:
                  type: array
                  maxItems: 6
                  items:
                    type: string
                anonymous_session_id:
                  type: string
                  description: Opcional si ja existeix sessió anònima estable
      responses:
        '201':
          description: Hold creat amb expires_at
        '409':
          description: Un o més seients no disponibles

  /api/holds/{holdId}/login-grace:
    post:
      summary: Atorgar +120 s al TTL del hold (una vegada) en iniciar login des del checkout
      tags: [Holds]
      security: []
      parameters:
        - name: holdId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                anonymous_session_id:
                  type: string
                  description: Ha coincidir amb el hold creat en mode anònim
      responses:
        '200':
          description: TTL estès; cos amb nou expires_at
        '403':
          description: Hold no vàlid o gràcia ja aplicada
        '404':
          description: Hold inexistent o expirat

  /api/holds/{holdId}:
    delete:
      summary: Alliberar hold (expiració natural o cancel·lació)

  /api/orders:
    post:
      summary: Confirmar comanda des d’un hold vàlid (estat pending_payment)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hold_id, anonymous_session_id]
              properties:
                hold_id:
                  type: string
                  format: uuid
                anonymous_session_id:
                  type: string
      responses:
        '201':
          description: Comanda creada en pending_payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreatedResponse'
        '403':
          description: Sessió/hold no coincideix
        '409':
          description: Hold caducat, seients no reservats o comanda duplicada

  /api/tickets:
    get:
      summary: Llistar entrades de l’usuari (historial)
      security:
        - bearerAuth: []

  /api/tickets/{ticketId}/qr:
    get:
      summary: Obtenir SVG QR (o redirecció a recurs generat)
      security:
        - bearerAuth: []

  /api/validation/scan:
    post:
      summary: Validar entrada (rol Validador)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: JWT llegit del QR
      responses:
        '200':
          description: Entrada marcada com a usada
        '400':
          description: Token invàlid o ja usat
        '503':
          description: Sense connexió / servidor (client ha de reintentar)

  /api/social/friends:
    get:
      summary: Llista d’amics (Usuari autenticat)
      tags: [Social]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Llista d’usuaris amics
          content:
            application/json:
              schema:
                type: object
                properties:
                  friends:
                    type: array
                    items:
                      $ref: '#/components/schemas/FriendProfile'

  /api/social/friend-invites:
    get:
      summary: Llistar invitacions (enviades i rebudes segons query)
      tags: [Social]
      security:
        - bearerAuth: []
      parameters:
        - name: direction
          in: query
          schema:
            type: string
            enum: [sent, received, all]
            default: all
      responses:
        '200':
          description: Llista d’invitacions
          content:
            application/json:
              schema:
                type: object
                properties:
                  invites:
                    type: array
                    items:
                      $ref: '#/components/schemas/FriendInvite'
    post:
      summary: Crear invitació (usuari existent o correu de nou usuari)
      description: |
        Exactament un de `receiver_id` o `receiver_email` (no ambdós). Opcionalment `invite_token` per enllaç segur.
      tags: [Social]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendInviteCreateRequest'
      responses:
        '201':
          description: Invitació creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendInvite'
        '409':
          description: Invitació duplicada o conflicte

  /api/social/friend-invites/{inviteId}:
    patch:
      summary: Acceptar o rebutjar invitació rebuda
      tags: [Social]
      security:
        - bearerAuth: []
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendInvitePatchRequest'
      responses:
        '200':
          description: Estat actualitzat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendInvite'
        '403':
          description: No autoritzat (no és el destinatari)
        '409':
          description: Estat incompatible (ja resolta)

  /api/tickets/{ticketId}/transfer:
    post:
      summary: Transferir propietat del ticket a un altre Usuari (validat al servidor)
      tags: [Social]
      security:
        - bearerAuth: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_user_id]
              properties:
                to_user_id:
                  type: integer
                  description: ID de l’usuari destinatari
      responses:
        '200':
          description: Transferència registrada; el servidor invalida el JWT/QR anterior i emet credencial nova (SVG) per al destinatari
        '403':
          description: No autoritzat o ticket no transferible
        '409':
          description: Comanda amb més d’una entrada o entrada no vàlida

  /api/admin/summary:
    get:
      summary: Resum esborrany per panell admin (mètriques + emit Socket intern opcional)
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dades agregades mínimes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSummaryResponse'
        '403':
          description: Rol Administrador requerit

  /api/admin/discovery/sync:
    post:
      summary: Disparar sincronització amb Ticketmaster Discovery Feed (Administrador)
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '202':
          description: Job d’importació acceptat
        '403':
          description: Rol Administrador requerit

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [name, username, email, password, password_confirmation]
      properties:
        name:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        password_confirmation:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT d’API (implementació actual Laravel)
        token_type:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/UserProfile'
        access_token:
          type: string
          deprecated: true
          description: No usar; veure `token`
        expires_in:
          type: integer
          description: Segons fins expiració del JWT (si s’exposa)

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string

    FriendProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string

    OrderCreatedResponse:
      type: object
      properties:
        order_id:
          type: integer
        state:
          type: string
        event_id:
          type: integer
        hold_id:
          type: string
        currency:
          type: string
        total_amount:
          type: string
        payment:
          type: object
        lines:
          type: array
          items:
            type: object

    AdminSummaryResponse:
      type: object
      properties:
        stub:
          type: boolean
        events_total:
          type: integer
        orders_paid:
          type: integer

    SeatmapResponse:
      type: object
      properties:
        snapshotImageUrl:
          type: string
          format: uri
        zones:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              label:
                type: string

    FriendInvite:
      type: object
      required: [id, sender_id, status]
      properties:
        id:
          type: string
          format: uuid
        sender_id:
          type: string
          description: ID numèric d’usuari (string per compatibilitat JSON)
        receiver_id:
          type: string
          nullable: true
          description: ID numèric del destinatari registrat (string al JSON)
        receiver_email:
          type: string
          format: email
          nullable: true
          description: Present si es convida per correu (usuari nou o pendent)
        status:
          type: string
          enum: [pending, accepted, rejected]
        invite_token:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FriendInviteCreateRequest:
      type: object
      properties:
        receiver_id:
          type: integer
        receiver_email:
          type: string
          format: email
        invite_token:
          type: string
          description: Opcional; generat pel servidor si cal
      oneOf:
        - required: [receiver_id]
        - required: [receiver_email]

    FriendInvitePatchRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [accept, reject]
